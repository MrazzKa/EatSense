<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — EatSense</title>
    <meta name="description" content="EatSense blog: practical, science-grounded nutrition — protein, sugar, fibre, labels and healthy habits.">
    <meta name="theme-color" content="#14181A">
    <link rel="icon" href="/images/eatsense.png" sizes="any">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
    <nav class="lnav" style="position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--line)">
        <div class="container" style="display:flex;align-items:center;justify-content:space-between;padding-top:14px;padding-bottom:14px">
            <a href="/" class="logo" style="display:flex;align-items:center;gap:.55rem;text-decoration:none;color:var(--accent-deep)">
                <img src="/images/eatsense.png" alt="" width="32" height="32" style="border-radius:8px">
                <span style="font-family:var(--font-display,'Unbounded');font-weight:600;font-size:1.25rem;color:var(--ink)">EatSense</span>
            </a>
            <a href="/" class="btn btn-ghost" data-blog-i18n="back">← Back to site</a>
        </div>
    </nav>

    <header class="legal-hero" style="text-align:center;padding:4rem 1.5rem 3rem;background:linear-gradient(180deg,var(--base-2),#fff);border-bottom:1px solid var(--line)">
        <span class="eyebrow" data-blog-i18n="tag" style="color:var(--accent)">Blog</span>
        <h1 class="section-title" data-blog-i18n="title" style="margin-top:.6rem">Eat with understanding</h1>
        <p class="section-sub" data-blog-i18n="subtitle" style="max-width:640px;margin:14px auto 0">Practical, science-grounded nutrition — no fads, no guilt.</p>
    </header>

    <main class="container" style="max-width:1000px;padding-top:48px;padding-bottom:80px">
        <div id="blogList" class="blog-grid"></div>
        <article id="blogPost" class="blog-article" hidden></article>
    </main>

    <footer style="text-align:center;padding:2rem 1.5rem;color:var(--ink-2);font-size:.85rem;border-top:1px solid var(--line)">
        © <span id="y"></span> EatSense · <a href="/privacy" style="color:var(--accent-deep)">Privacy</a> · <a href="/terms" style="color:var(--accent-deep)">Terms</a> · <a href="/support" style="color:var(--accent-deep)">Support</a>
    </footer>

    <script src="/assets/blog-data.js"></script>
    <script>
    (function () {
      var posts = (window.EATSENSE_BLOG || []).slice().sort(function (a, b) { return (a.date < b.date) ? 1 : -1; });
      function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]; }); }
      function fmtDate(d) { try { return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }); } catch (e) { return d; } }
      function cover(hue) { return 'linear-gradient(135deg, hsl(' + hue + ',52%,42%), hsl(' + ((hue + 26) % 360) + ',58%,32%))'; }
      var listEl = document.getElementById('blogList');
      var postEl = document.getElementById('blogPost');
      document.getElementById('y').textContent = new Date().getFullYear();

      var params = new URLSearchParams(location.search);
      var slug = params.get('post');
      var found = slug && posts.filter(function (p) { return p.slug === slug; })[0];

      if (found) {
        document.title = found.title + ' — EatSense';
        listEl.hidden = true;
        postEl.hidden = false;
        postEl.innerHTML =
          '<a href="/blog/" class="blog-back">← All articles</a>' +
          '<div class="blog-cover" style="background:' + cover(found.hue || 152) + '"><span class="blog-chip">' + esc(found.tag) + '</span></div>' +
          '<h1 class="blog-post-title">' + esc(found.title) + '</h1>' +
          '<div class="blog-meta">' + fmtDate(found.date) + ' · ' + (found.minutes || 4) + ' min read</div>' +
          '<div class="blog-body">' + (found.body || '') + '</div>' +
          '<a href="/#download" class="btn btn-primary" style="margin-top:32px">Get EatSense</a>';
        window.scrollTo(0, 0);
      } else {
        postEl.hidden = true;
        listEl.hidden = false;
        if (!posts.length) { listEl.innerHTML = '<p style="color:var(--ink-2)">No articles yet.</p>'; return; }
        listEl.innerHTML = posts.map(function (p) {
          return '<a class="blog-card" href="/blog/?post=' + encodeURIComponent(p.slug) + '">' +
            '<div class="blog-cover" style="background:' + cover(p.hue || 152) + '"><span class="blog-chip">' + esc(p.tag) + '</span></div>' +
            '<div class="blog-card-body">' +
            '<h3>' + esc(p.title) + '</h3>' +
            '<p>' + esc(p.excerpt) + '</p>' +
            '<div class="blog-meta">' + fmtDate(p.date) + ' · ' + (p.minutes || 4) + ' min</div>' +
            '</div></a>';
        }).join('');
      }
    })();
    </script>
</body>
</html>
