<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EatSense Admin Panel</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3148;
      --text: #e4e8f7;
      --text2: #8b91a8;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --accent: #818cf8;
      --green: #22c55e;
      --green-bg: #22c55e22;
      --red: #ef4444;
      --red-bg: #ef444422;
      --yellow: #f59e0b;
      --yellow-bg: #f59e0b22;
      --blue: #3b82f6;
      --blue-bg: #3b82f622;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      text-align: center;
    }
    .login-card h1 { font-size: 22px; margin-bottom: 6px; }
    .login-card p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    .login-card input:focus { border-color: var(--primary); }
    .login-card .url-input { margin-bottom: 12px; }

    /* ===== LAYOUT ===== */
    #app { display: none; }
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 { font-size: 18px; display: flex; align-items: center; gap: 10px; }
    .topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 12px 28px 0;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      transition: all .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .content { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green)44; }
    .btn-green:hover { background: var(--green); color: #fff; }
    .btn-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red)44; }
    .btn-red:hover { background: var(--red); color: #fff; }
    .btn-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow)44; }
    .btn-yellow:hover { background: var(--yellow); color: #fff; }
    .btn-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue)44; }
    .btn-blue:hover { background: var(--blue); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-outline:hover { color: var(--text); border-color: var(--text2); }

    .btn:disabled { opacity: 0.5; pointer-events: none; }

    /* ===== CARDS ===== */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .card-body { font-size: 14px; color: var(--text2); line-height: 1.6; }
    .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-pending { background: var(--yellow-bg); color: var(--yellow); }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-votes { background: var(--blue-bg); color: var(--blue); }
    .badge-diet { background: var(--green-bg); color: var(--green); }
    .badge-lifestyle { background: var(--primary); color: #fff; opacity: 0.85; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .empty-state .icon { margin-bottom: 12px; display: flex; justify-content: center; color: var(--text2); }
    .empty-state .icon svg { width: 48px; height: 48px; }

    .btn svg, .tab svg, .badge svg { vertical-align: -2px; }
    .icon-inline { display: inline-flex; align-items: center; gap: 6px; }
    .stars { display: inline-flex; gap: 2px; color: var(--yellow); }

    .stat-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 140px;
    }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .report-content {
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.5;
    }
    .report-content .label { color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .filter-bar .btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 14px;
      z-index: 1000;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .loading { text-align: center; padding: 40px; color: var(--text2); }

    .file-modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,.72);
      z-index: 2000;
    }
    .file-modal {
      width: min(1100px, 96vw);
      height: min(820px, 92vh);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }
    .file-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .file-modal-title { font-size: 14px; font-weight: 700; word-break: break-word; }
    .file-modal-body {
      flex: 1;
      min-height: 0;
      background: #101218;
    }
    .file-modal-body iframe,
    .file-modal-body img {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .file-modal-body img {
      object-fit: contain;
      padding: 12px;
      background: #0b0d12;
    }
    .file-modal-message {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text2);
      text-align: center;
    }

    @media (max-width: 720px) {
      body {
        overflow-x: hidden;
      }

      #login-screen {
        padding: 16px;
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        padding: 28px 20px;
      }

      .topbar {
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
      }

      .topbar h1 {
        min-width: 0;
        font-size: 16px;
      }

      .topbar-right {
        flex: 1;
        justify-content: flex-end;
        min-width: 0;
      }

      #api-url-display {
        max-width: 46vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tabs {
        gap: 2px;
        overflow-x: auto;
        padding: 8px 12px 0;
        -webkit-overflow-scrolling: touch;
      }

      .tab {
        flex: 0 0 auto;
        padding: 12px 14px;
        white-space: nowrap;
      }

      .content {
        width: 100%;
        padding: 16px 12px 96px;
      }

      .stat-bar,
      .filter-bar {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        -webkit-overflow-scrolling: touch;
      }

      .stat {
        min-width: 132px;
        padding: 14px;
      }

      .card {
        padding: 14px;
        border-radius: 10px;
      }

      .card-header {
        flex-direction: column;
        gap: 10px;
      }

      .card-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .btn {
        min-height: 40px;
        padding: 9px 12px;
      }

      .btn-sm {
        min-height: 38px;
        padding: 8px 12px;
      }

      .card-actions .btn {
        width: 100%;
      }

      textarea,
      input {
        max-width: 100%;
      }

      .file-modal {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
      }

      .file-modal-header {
        align-items: flex-start;
        gap: 10px;
        padding: 12px;
      }

      .file-modal-header > div:last-child {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .file-modal-title {
        max-width: 52vw;
      }

      .toast {
        right: 12px;
        bottom: 12px;
        left: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <h1 style="display:flex;align-items:center;justify-content:center;gap:8px"><span id="login-logo-slot"></span>EatSense Admin</h1>
      <p>Enter admin secret to continue</p>
      <script>document.getElementById('login-logo-slot').innerHTML = ic('leaf', 22);</script>
      <!-- API URL is auto-detected from current origin. Hidden by default; click "Use different API" to override. -->
      <input type="text" id="api-url" class="url-input" style="display:none" />
      <input type="password" id="admin-secret" placeholder="Admin Secret" autofocus />
      <button class="btn btn-primary" style="width:100%;padding:12px;" onclick="login()">Sign In</button>
      <p style="margin-top:8px;font-size:11px;color:var(--text2);text-align:center;">
        Using API: <span id="login-api-display"></span>
        <a href="#" onclick="toggleApiOverride(event)" style="color:var(--accent);margin-left:6px;">change</a>
      </p>
      <p id="login-error" style="color:var(--red);margin-top:12px;display:none;font-size:13px;"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app">
    <div class="topbar">
      <h1><span class="dot"></span> EatSense Admin</h1>
      <div class="topbar-right">
        <span id="api-url-display" style="font-size:12px;color:var(--text2)"></span>
        <button class="btn btn-outline btn-sm" onclick="logout()">Sign Out</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active icon-inline" data-tab="suggestions" onclick="switchTab('suggestions')" id="tabbtn-suggestions">Suggestions</div>
      <div class="tab icon-inline" data-tab="reports" onclick="switchTab('reports')" id="tabbtn-reports" title="Жалобы пользователей на посты, комментарии и аккаунты в коммьюнити">Reports</div>
      <div class="tab icon-inline" data-tab="reviews" onclick="switchTab('reviews')" id="tabbtn-reviews" title="Отзывы клиентов на экспертов">Reviews</div>
      <div class="tab icon-inline" data-tab="experts" onclick="switchTab('experts')" id="tabbtn-experts" title="Заявки на роль эксперта: проверка документов и одобрение">Experts</div>
      <div class="tab icon-inline" data-tab="posts" onclick="switchTab('posts')" id="tabbtn-posts" title="Модерация постов сообщества (Best Places и обычные посты)">Posts</div>
    </div>
    <script>
      document.getElementById('tabbtn-suggestions').insertAdjacentHTML('afterbegin', ic('list', 14) + ' ');
      document.getElementById('tabbtn-reports').insertAdjacentHTML('afterbegin', ic('flag', 14) + ' ');
      document.getElementById('tabbtn-reviews').insertAdjacentHTML('afterbegin', ic('star', 14) + ' ');
      document.getElementById('tabbtn-experts').insertAdjacentHTML('afterbegin', ic('stethoscope', 14) + ' ');
      document.getElementById('tabbtn-posts').insertAdjacentHTML('afterbegin', ic('check', 14) + ' ');
    </script>

    <div class="content">
      <!-- SUGGESTIONS TAB -->
      <div id="tab-suggestions">
        <div class="stat-bar" id="suggestions-stats"></div>
        <div id="suggestions-list"><div class="loading">Loading suggestions...</div></div>
      </div>

      <!-- REVIEWS TAB -->
      <div id="tab-reviews" style="display:none">
        <div class="stat-bar" id="reviews-stats"></div>
        <div id="reviews-list"><div class="loading">Loading reviews...</div></div>
      </div>

      <!-- REPORTS TAB -->
      <div id="tab-reports" style="display:none">
        <div class="filter-bar" id="reports-filter">
          <button class="btn btn-outline btn-sm active" onclick="filterReports('')">All</button>
          <button class="btn btn-outline btn-sm" onclick="filterReports('PENDING')">Pending</button>
          <button class="btn btn-outline btn-sm" onclick="filterReports('RESOLVED')">Resolved</button>
          <button class="btn btn-outline btn-sm" onclick="filterReports('DISMISSED')">Dismissed</button>
        </div>
        <div class="stat-bar" id="reports-stats"></div>
        <div id="reports-list"><div class="loading">Loading reports...</div></div>
      </div>

      <!-- EXPERTS TAB -->
      <div id="tab-experts" style="display:none">
        <div class="filter-bar" id="experts-filter">
          <button class="btn btn-outline btn-sm active" onclick="filterExperts('')">All</button>
          <button class="btn btn-outline btn-sm" onclick="filterExperts('pending')">Pending</button>
          <button class="btn btn-outline btn-sm" onclick="filterExperts('approved')">Approved</button>
          <button class="btn btn-outline btn-sm" onclick="filterExperts('unpublished')">Unpublished</button>
          <button class="btn btn-outline btn-sm" onclick="filterExperts('rejected')">Rejected</button>
          <button class="btn btn-green btn-sm" style="margin-left:auto" onclick="openCreateExpertModal()">+ Create expert</button>
        </div>
        <div class="stat-bar" id="experts-stats"></div>
        <div id="experts-list"><div class="loading">Loading experts...</div></div>

        <!-- Create expert modal -->
        <div id="create-expert-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center; padding:16px;">
          <div style="background:#fff; max-width:680px; width:100%; max-height:90vh; overflow-y:auto; border-radius:12px; padding:24px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
              <h2 style="margin:0">Create expert</h2>
              <button class="btn btn-outline btn-sm" onclick="closeCreateExpertModal()">Close</button>
            </div>
            <form id="create-expert-form" onsubmit="submitCreateExpert(event)">
              <div class="form-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <label>Email *<input name="email" type="email" required></label>
                <label>Type *
                  <select name="type" required>
                    <option value="">—</option>
                    <option value="nutritionist">Nutritionist</option>
                    <option value="dietitian">Dietitian</option>
                    <option value="psychologist">Psychologist</option>
                    <option value="endocrinologist">Endocrinologist</option>
                    <option value="obgyn">OB-GYN (Акушер-гинеколог)</option>
                    <option value="pediatrician">Pediatrician</option>
                    <option value="gp">General Practitioner</option>
                    <option value="other">Other</option>
                  </select>
                </label>
                <label>First name<input name="firstName" type="text" maxlength="80"></label>
                <label>Last name<input name="lastName" type="text" maxlength="80"></label>
                <label style="grid-column:1/-1">Display name *<input name="displayName" type="text" required maxlength="100"></label>
                <label>Country (ISO-2)<input name="country" type="text" maxlength="2" placeholder="CH"></label>
                <label>City<input name="city" type="text" maxlength="100"></label>
                <label>Timezone (IANA)<input name="timezone" type="text" placeholder="Europe/Zurich" maxlength="64"></label>
                <label>Phone<input name="phone" type="tel" maxlength="40"></label>
                <label>License number<input name="licenseNumber" type="text" maxlength="100"></label>
                <label>Experience years<input name="experienceYears" type="number" min="0" max="70"></label>
                <label style="grid-column:1/-1">Languages (comma-separated)<input name="languages" type="text" placeholder="en, ru, fr" maxlength="100"></label>
                <label style="grid-column:1/-1">Specializations (comma-separated)<input name="specializations" type="text" placeholder="weight loss, diabetes" maxlength="500"></label>
                <label style="grid-column:1/-1">Bio<textarea name="bio" rows="4" maxlength="4000"></textarea></label>
                <label style="grid-column:1/-1">Education (free text)<textarea name="education" rows="2" maxlength="4000"></textarea></label>
                <label style="grid-column:1/-1">
                  Credentials (PDF/JPG/PNG; до 15 МБ каждый)
                  <input type="file" name="credentialFiles" multiple accept="application/pdf,image/png,image/jpeg" oninput="onCredentialsPicked(event)">
                  <small style="color:#666">Загрузи дипломы/сертификаты. Имя файла будет использовано как название документа.</small>
                  <div id="credentials-preview" style="margin-top:6px; font-size:12px; color:#444;"></div>
                </label>

                <label style="grid-column:1/-1">
                  Access code (optional — leave empty for auto)
                  <div style="display:flex; gap:8px; align-items:center;">
                    <input name="accessCode" type="text" pattern="[A-Z0-9-]{4,32}" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase(); checkAccessCodeAvailability(this.value)">
                    <span id="code-availability" style="font-size:12px;"></span>
                  </div>
                  <small style="color:#666">Format: [A-Z0-9-]{4..32}. Example: <code>SOPHIA-NUTRITION</code>, <code>PHARMA-GENEVE-01</code></small>
                  <div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap;">
                    <button type="button" class="btn btn-outline btn-sm" onclick="suggestExpertCode(0)">Name-Type</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="suggestExpertCode(1)">Name-City-01</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="suggestExpertCode(2)">Name-Lastname</button>
                  </div>
                </label>
              </div>
              <div style="margin-top:20px; display:flex; gap:8px; justify-content:flex-end;">
                <button type="button" class="btn btn-outline" onclick="closeCreateExpertModal()">Cancel</button>
                <button type="submit" class="btn btn-green">Create expert</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- POSTS MODERATION TAB -->
      <div id="tab-posts" style="display:none">
        <div class="filter-bar" id="posts-filter">
          <button class="btn btn-outline btn-sm active" onclick="filterPostType('')">All types</button>
          <button class="btn btn-outline btn-sm" onclick="filterPostType('BEST_PLACES')">Best Places</button>
          <button class="btn btn-outline btn-sm" onclick="filterPostType('TEXT')">Text</button>
          <button class="btn btn-outline btn-sm" onclick="filterPostType('PHOTO')">Photo</button>
        </div>
        <div class="stat-bar" id="posts-stats"></div>
        <div id="posts-list"><div class="loading">Loading pending posts...</div></div>
      </div>
    </div>
  </div>

  <div id="file-preview-modal" class="file-modal-backdrop" onclick="if(event.target === this) closeFilePreview()">
    <div class="file-modal">
      <div class="file-modal-header">
        <div id="file-preview-title" class="file-modal-title">Document preview</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="file-preview-download" class="btn btn-outline btn-sm" type="button">Download</button>
          <button class="btn btn-outline btn-sm" type="button" onclick="closeFilePreview()">Close</button>
        </div>
      </div>
      <div id="file-preview-body" class="file-modal-body"></div>
    </div>
  </div>

  <script>
    let API_URL = '';
    let ADMIN_SECRET = '';
    let currentReportsFilter = '';

    // ===== ICONS (Lucide-style inline SVG) =====
    const ICON_PATHS = {
      leaf: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19.2 2.96c.97 5.04.03 12.04-5.2 15.04-2.82 1.66-5.48 2.01-7.5 2.01"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>',
      list: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',

    };
    function ic(name, size = 14) {
      const d = ICON_PATHS[name] || '';
      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${d}</svg>`;
    }
    function starsSvg(count, max = 5) {
      const filled = Math.min(Math.max(count, 0), max);
      let out = '<span class="stars">';
      for (let i = 0; i < filled; i++) {
        out += `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round">${ICON_PATHS.star}</svg>`;
      }
      for (let i = filled; i < max; i++) {
        out += `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" style="opacity:0.35">${ICON_PATHS.star}</svg>`;
      }
      out += '</span>';
      return out;
    }

    // ===== AUTH =====
    function toggleApiOverride(e) {
      if (e) e.preventDefault();
      const input = document.getElementById('api-url');
      input.style.display = input.style.display === 'none' ? 'block' : 'none';
      if (input.style.display === 'block' && !input.value) {
        input.value = window.location.origin;
        input.focus();
      }
    }

    function getEffectiveApiUrl() {
      const overrideEl = document.getElementById('api-url');
      const override = overrideEl && overrideEl.style.display !== 'none' ? overrideEl.value.trim() : '';
      return (override || window.location.origin).replace(/\/+$/, '');
    }

    function login() {
      const url = getEffectiveApiUrl();
      const secret = document.getElementById('admin-secret').value.trim();
      if (!secret) {
        showLoginError('Please enter Admin Secret');
        return;
      }
      API_URL = url;
      ADMIN_SECRET = secret;

      // Test connection
      fetchAPI('/diets/suggestions/pending')
        .then(() => {
          sessionStorage.setItem('api_url', url);
          sessionStorage.setItem('admin_secret', secret);
          showApp();
        })
        .catch(err => {
          showLoginError('Invalid credentials or API URL: ' + err.message);
        });
    }

    function logout() {
      sessionStorage.clear();
      location.reload();
    }

    function showLoginError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('api-url-display').textContent = API_URL;
      loadSuggestions();
      loadReports();
    }

    // Auto-login from session — API URL defaults to current origin so the admin
    // does not need to type it. Sessions still store an override URL if used.
    window.addEventListener('DOMContentLoaded', () => {
      const defaultUrl = window.location.origin.replace(/\/+$/, '');
      document.getElementById('login-api-display').textContent = defaultUrl;
      const savedUrl = sessionStorage.getItem('api_url') || defaultUrl;
      const savedSecret = sessionStorage.getItem('admin_secret');
      if (savedSecret) {
        API_URL = savedUrl;
        ADMIN_SECRET = savedSecret;
        showApp();
      }
    });

    // ===== API =====
    async function fetchAPI(path, options = {}) {
      const res = await fetch(API_URL + path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'x-admin-secret': ADMIN_SECRET,
          ...(options.headers || {}),
        },
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.message || `HTTP ${res.status}`);
      }
      return res.json();
    }

    function resolveAdminFileUrl(url) {
      if (!url) return '';
      if (/^https?:\/\//i.test(url)) return url;
      return API_URL + url;
    }

    async function fetchAdminFile(url) {
      const res = await fetch(resolveAdminFileUrl(url), {
        headers: { 'x-admin-secret': ADMIN_SECRET },
      });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        let message = `HTTP ${res.status}`;
        try {
          const parsed = JSON.parse(text);
          message = Array.isArray(parsed.message) ? parsed.message.join(', ') : (parsed.message || message);
        } catch {}
        throw new Error(message);
      }
      const blob = await res.blob();
      return {
        blob,
        contentType: res.headers.get('content-type') || blob.type || '',
      };
    }

    let currentPreviewUrl = '';
    function closeFilePreview() {
      document.getElementById('file-preview-modal').style.display = 'none';
      document.getElementById('file-preview-body').innerHTML = '';
      if (currentPreviewUrl) URL.revokeObjectURL(currentPreviewUrl);
      currentPreviewUrl = '';
    }

    async function previewAdminFile(url, filename = 'document', hintedType = '') {
      try {
        const { blob, contentType } = await fetchAdminFile(url);
        if (currentPreviewUrl) URL.revokeObjectURL(currentPreviewUrl);
        currentPreviewUrl = URL.createObjectURL(blob);
        const type = contentType || hintedType || '';
        const title = filename || 'Document preview';
        document.getElementById('file-preview-title').textContent = title;
        document.getElementById('file-preview-download').onclick = () => downloadBlob(currentPreviewUrl, title);

        const body = document.getElementById('file-preview-body');
        if (/pdf/i.test(type) || /\.pdf$/i.test(title)) {
          body.innerHTML = `<iframe title="Document preview" src="${currentPreviewUrl}"></iframe>`;
        } else if (/^image\//i.test(type) || /\.(png|jpe?g|webp|gif)$/i.test(title)) {
          body.innerHTML = `<img alt="Document preview" src="${currentPreviewUrl}" />`;
        } else {
          body.innerHTML = '<div class="file-modal-message">Preview is not available for this file type. You can still download it.</div>';
        }
        document.getElementById('file-preview-modal').style.display = 'flex';
      } catch (err) {
        toast('Cannot preview file: ' + err.message);
      }
    }

    function downloadBlob(objectUrl, filename) {
      const a = document.createElement('a');
      a.href = objectUrl;
      a.download = filename || 'document';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    async function downloadAdminFile(url, filename = 'document') {
      try {
        const { blob } = await fetchAdminFile(url);
        const objectUrl = URL.createObjectURL(blob);
        downloadBlob(objectUrl, filename);
        setTimeout(() => URL.revokeObjectURL(objectUrl), 30000);
      } catch (err) {
        toast('Cannot download file: ' + err.message);
      }
    }

    function encArg(value) {
      return encodeURIComponent(String(value == null ? '' : value));
    }

    // ===== TABS =====
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      ['suggestions', 'reports', 'reviews', 'experts', 'posts'].forEach(t => {
        document.getElementById('tab-' + t).style.display = tab === t ? 'block' : 'none';
      });
      if (tab === 'reviews') loadReviews();
      if (tab === 'experts') loadExperts();
      if (tab === 'posts') loadPendingPosts();
    }

    // ===== POSTS MODERATION =====
    let currentPostType = '';

    function filterPostType(type) {
      currentPostType = type;
      document.querySelectorAll('#posts-filter .btn').forEach(b => b.classList.remove('active'));
      const all = document.querySelectorAll('#posts-filter .btn');
      const idx = ['', 'BEST_PLACES', 'TEXT', 'PHOTO'].indexOf(type);
      if (all[idx]) all[idx].classList.add('active');
      loadPendingPosts();
    }

    async function loadPendingPosts() {
      const list = document.getElementById('posts-list');
      list.innerHTML = '<div class="loading">Loading pending posts...</div>';
      try {
        const qs = currentPostType ? '?type=' + encodeURIComponent(currentPostType) : '';
        const data = await fetchAPI('/community/admin/pending' + qs);
        const items = asArr(data && data.data ? data.data : data);
        document.getElementById('posts-stats').textContent = (data?.total || 0) + ' pending';
        if (items.length === 0) {
          list.innerHTML = '<div class="loading">No pending posts.</div>';
          return;
        }
        list.innerHTML = items.map(p => {
          const meta = p.metadata || {};
          const author = (p.author?.userProfile?.firstName || '') + ' ' + (p.author?.userProfile?.lastName || '');
          const placeName = meta.placeName ? `<div><b>Place:</b> ${escapeHtml(meta.placeName)}</div>` : '';
          const city = meta.city ? `<div><b>City:</b> ${escapeHtml(meta.city)}</div>` : '';
          const img = p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" style="max-width:200px;max-height:160px;border-radius:8px;margin-top:8px"/>` : '';
          return `
            <div class="card" style="padding:12px;margin-bottom:10px;border:1px solid var(--border);border-radius:10px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                <div>
                  <div><b>${escapeHtml(p.type)}</b> · ${escapeHtml(author.trim() || p.author?.email || 'Unknown')}</div>
                  ${placeName}${city}
                  <div style="margin-top:6px;color:var(--text-secondary);">${escapeHtml(p.content || '')}</div>
                  ${img}
                  <div style="margin-top:6px;font-size:11px;color:var(--text-tertiary);">submitted ${new Date(p.createdAt).toLocaleString()}</div>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;min-width:140px;">
                  <button class="btn btn-green btn-sm" onclick="approvePost('${p.id}')">${ic('check')} Approve</button>
                  <button class="btn btn-red btn-sm" onclick="rejectPost('${p.id}')">${ic('x')} Reject</button>
                </div>
              </div>
            </div>
          `;
        }).join('');
      } catch (e) {
        list.innerHTML = '<div class="loading">Failed to load: ' + (e?.message || e) + '</div>';
      }
    }

    async function approvePost(id) {
      try {
        await fetchAPI('/community/admin/posts/' + id + '/approve', { method: 'PATCH' });
        loadPendingPosts();
      } catch (e) {
        alert('Approve failed: ' + (e?.message || e));
      }
    }

    async function rejectPost(id) {
      const reason = prompt('Reason for rejection (optional):') || '';
      try {
        await fetchAPI('/community/admin/posts/' + id + '/reject', {
          method: 'PATCH',
          body: JSON.stringify({ reason }),
          headers: { 'Content-Type': 'application/json' },
        });
        loadPendingPosts();
      } catch (e) {
        alert('Reject failed: ' + (e?.message || e));
      }
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Coerce any API result into an array. Survives backend returning null,
    // an object wrapper, or unexpected shape — without breaking .map()/.filter() below.
    function asArr(x) {
      if (Array.isArray(x)) return x;
      if (x && Array.isArray(x.data)) return x.data;
      if (x && Array.isArray(x.items)) return x.items;
      if (x && Array.isArray(x.experts)) return x.experts;
      if (x && Array.isArray(x.reviews)) return x.reviews;
      if (x && Array.isArray(x.reports)) return x.reports;
      if (x && Array.isArray(x.suggestions)) return x.suggestions;
      return [];
    }

    // ===== SUGGESTIONS =====
    async function loadSuggestions() {
      try {
        const data = await fetchAPI('/diets/suggestions/pending');
        renderSuggestions(data);
      } catch (err) {
        document.getElementById('suggestions-list').innerHTML = `<div class="empty-state"><div class="icon">${ic('alert', 48)}</div>Error: ${err.message}</div>`;
      }
    }

    function renderSuggestions(suggestions) {
      suggestions = asArr(suggestions);
      const stats = document.getElementById('suggestions-stats');
      const list = document.getElementById('suggestions-list');

      const total = suggestions.length;
      const diets = suggestions.filter(s => s.type === 'diet').length;
      const lifestyles = suggestions.filter(s => s.type === 'lifestyle').length;
      const totalVotes = suggestions.reduce((acc, s) => acc + s.votes, 0);

      stats.innerHTML = `
        <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Pending</div></div>
        <div class="stat"><div class="stat-value">${diets}</div><div class="stat-label">Diets</div></div>
        <div class="stat"><div class="stat-value">${lifestyles}</div><div class="stat-label">Lifestyles</div></div>
        <div class="stat"><div class="stat-value">${totalVotes}</div><div class="stat-label">Total Votes</div></div>
      `;

      if (total === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">${ic('check', 48)}</div>No pending suggestions</div>`;
        return;
      }

      list.innerHTML = suggestions.map(s => `
        <div class="card" id="suggestion-${s.id}">
          <div class="card-header">
            <div>
              <div class="card-title">${escapeHtml(s.name)}</div>
              <div class="card-meta">
                <span class="badge ${s.type === 'diet' ? 'badge-diet' : 'badge-lifestyle'}">${s.type}</span>
                <span class="badge badge-votes icon-inline">${ic('voteBox', 12)} ${s.votes} vote${s.votes !== 1 ? 's' : ''}</span>
                ${s.createdAt ? `<span class="icon-inline" style="margin-left:8px">${ic('calendar', 12)} ${new Date(s.createdAt).toLocaleDateString()}</span>` : ''}
              </div>
            </div>
            <span class="badge badge-pending">pending</span>
          </div>
          ${s.description ? `<div class="card-body">${escapeHtml(s.description)}</div>` : ''}
          <div class="card-actions">
            <button class="btn btn-green btn-sm icon-inline" onclick="approveSuggestion('${s.id}')">${ic('check')} Approve (6mo PRO)</button>
            <button class="btn btn-red btn-sm icon-inline" onclick="rejectSuggestion('${s.id}')">${ic('x')} Reject</button>
          </div>
        </div>
      `).join('');
    }

    async function approveSuggestion(id) {
      if (!confirm('Approve this suggestion? The author will receive 6 months PRO.')) return;
      try {
        await fetchAPI(`/diets/suggestions/${id}/approve`, { method: 'PATCH' });
        toast('Suggestion approved. Author rewarded with 6mo PRO.');
        document.getElementById(`suggestion-${id}`)?.remove();
        loadSuggestions();
      } catch (err) { toast('Error: ' + err.message); }
    }

    async function rejectSuggestion(id) {
      if (!confirm('Reject this suggestion?')) return;
      try {
        await fetchAPI(`/diets/suggestions/${id}/reject`, { method: 'PATCH' });
        toast('Suggestion rejected');
        document.getElementById(`suggestion-${id}`)?.remove();
        loadSuggestions();
      } catch (err) { toast('Error: ' + err.message); }
    }

    // ===== REPORTS =====
    async function loadReports(status) {
      try {
        const query = status ? `?status=${status}` : '';
        const data = await fetchAPI(`/community/admin/reports${query}`);
        renderReports(data);
      } catch (err) {
        document.getElementById('reports-list').innerHTML = `<div class="empty-state"><div class="icon">${ic('alert', 48)}</div>Error: ${err.message}</div>`;
      }
    }

    function filterReports(status) {
      currentReportsFilter = status;
      document.querySelectorAll('#reports-filter .btn').forEach(b => {
        b.classList.toggle('active', (status === '' && b.textContent.includes('All')) || b.textContent.includes(status));
      });
      loadReports(status);
    }

    function renderReports(reports) {
      reports = asArr(reports);
      const stats = document.getElementById('reports-stats');
      const list = document.getElementById('reports-list');

      const pending = reports.filter(r => r.status === 'PENDING').length;
      const resolved = reports.filter(r => r.status === 'RESOLVED').length;
      const dismissed = reports.filter(r => r.status === 'DISMISSED').length;

      stats.innerHTML = `
        <div class="stat"><div class="stat-value">${reports.length}</div><div class="stat-label">Total</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--yellow)">${pending}</div><div class="stat-label">Pending</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--green)">${resolved}</div><div class="stat-label">Resolved</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--text2)">${dismissed}</div><div class="stat-label">Dismissed</div></div>
      `;

      if (reports.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">${ic('party', 48)}</div>No reports found</div>`;
        return;
      }

      list.innerHTML = reports.map(r => {
        const reporterName = getUserName(r.user);
        const isPending = r.status === 'PENDING';
        let contentHtml = '';

        if (r.post) {
          const authorName = getUserName(r.post.author);
          contentHtml = `
            <div class="report-content">
              <div class="label">Reported Post (by ${escapeHtml(authorName)} in ${escapeHtml(r.post.group?.name || '?')})</div>
              <div>${escapeHtml(r.post.content?.substring(0, 300))}${(r.post.content?.length || 0) > 300 ? '...' : ''}</div>
            </div>`;
        }

        if (r.comment) {
          const authorName = getUserName(r.comment.author);
          contentHtml += `
            <div class="report-content">
              <div class="label">Reported Comment (by ${escapeHtml(authorName)})</div>
              <div>${escapeHtml(r.comment.content?.substring(0, 300))}${(r.comment.content?.length || 0) > 300 ? '...' : ''}</div>
            </div>`;
        }

        return `
          <div class="card" id="report-${r.id}">
            <div class="card-header">
              <div>
                <div class="card-title">Report from ${escapeHtml(reporterName)}</div>
                <div class="card-meta">
                  Reason: <strong>${escapeHtml(r.reason)}</strong>
                  &nbsp;·&nbsp; ${new Date(r.createdAt).toLocaleString()}
                </div>
              </div>
              <span class="badge ${r.status === 'PENDING' ? 'badge-pending' : ''}">${r.status}</span>
            </div>
            ${contentHtml}
            ${isPending ? `
              <div class="card-actions">
                <button class="btn btn-green btn-sm icon-inline" onclick="resolveReport('${r.id}', false)">${ic('check')} Resolve (keep content)</button>
                <button class="btn btn-red btn-sm icon-inline" onclick="resolveReport('${r.id}', true)">${ic('trash')} Resolve & Delete</button>
                <button class="btn btn-yellow btn-sm icon-inline" onclick="dismissReport('${r.id}')">${ic('x')} Dismiss</button>
                ${r.post ? `<button class="btn btn-red btn-sm icon-inline" onclick="adminDeletePost('${r.post.id}')">${ic('trash')} Delete Post</button>` : ''}
                ${r.comment ? `<button class="btn btn-red btn-sm icon-inline" onclick="adminDeleteComment('${r.comment.id}')">${ic('trash')} Delete Comment</button>` : ''}
              </div>
            ` : ''}
          </div>`;
      }).join('');
    }

    async function resolveReport(id, deleteContent) {
      const msg = deleteContent ? 'Resolve and DELETE the reported content?' : 'Resolve this report (keep content)?';
      if (!confirm(msg)) return;
      try {
        await fetchAPI(`/community/admin/reports/${id}/resolve`, {

    // ===== REVIEWS =====
    async function loadReviews() {
      try {
        const data = await fetchAPI('/reviews/admin');
        renderReviews(data);
      } catch (err) {
        document.getElementById('reviews-list').innerHTML = `<div class="empty-state"><div class="icon">${ic('alert', 48)}</div>Error: ${err.message}</div>`;
      }
    }

    function renderReviews(reviews) {
      reviews = asArr(reviews);
      const stats = document.getElementById('reviews-stats');
      const list = document.getElementById('reviews-list');

      const total = reviews.length;
      const visible = reviews.filter(r => r.isVisible !== false).length;
      const hidden = total - visible;
      const avgRating = total > 0 ? (reviews.reduce((acc, r) => acc + r.rating, 0) / total).toFixed(1) : '—';

      stats.innerHTML = `
        <div class="stat"><div class="stat-value">${total}</div><div class="stat-label">Total Reviews</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--green)">${visible}</div><div class="stat-label">Visible</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--red)">${hidden}</div><div class="stat-label">Hidden</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--yellow)">${avgRating}</div><div class="stat-label">Avg Rating</div></div>
      `;

      if (total === 0) {
        list.innerHTML = `<div class="empty-state"><div class="icon">${ic('star', 48)}</div>No reviews yet</div>`;
        return;
      }

      list.innerHTML = reviews.map(r => {
        const clientName = getUserName(r.client);
        const expertName = r.expert?.displayName || 'Unknown Expert';
        const isHidden = r.isVisible === false;

        return `
          <div class="card" id="review-${r.id}" ${isHidden ? 'style="opacity:0.6"' : ''}>
            <div class="card-header">
              <div>
                <div class="card-title">${starsSvg(r.rating)} <span style="font-size:13px;color:var(--text2)">(${r.rating}/5)</span></div>
                <div class="card-meta">
                  By <strong>${escapeHtml(clientName)}</strong> about <strong>${escapeHtml(expertName)}</strong>
                  &nbsp;·&nbsp; ${new Date(r.createdAt).toLocaleString()}
                  ${isHidden ? ' &nbsp;·&nbsp; <span style="color:var(--red)">HIDDEN</span>' : ''}
                </div>
              </div>
              <span class="badge ${isHidden ? 'badge-pending' : 'badge-diet'}">${isHidden ? 'hidden' : 'visible'}</span>
            </div>
            ${r.comment ? `<div class="card-body">${escapeHtml(r.comment)}</div>` : '<div class="card-body" style="font-style:italic">No comment</div>'}
            <div class="card-actions">
              <button class="btn ${isHidden ? 'btn-green' : 'btn-yellow'} btn-sm" onclick="toggleReviewVisibility('${r.id}')"><span class="icon-inline">${isHidden ? ic('eye') : ic('eyeOff')} ${isHidden ? 'Show' : 'Hide'}</span></button>
              <button class="btn btn-red btn-sm" onclick="adminDeleteReview('${r.id}')"><span class="icon-inline">${ic('trash')} Delete</span></button>
            </div>
          </div>`;
      }).join('');
    }

                ${(expert.specializations || []).map(s => `<span class="badge" style="background:var(--blue-bg);color:var(--blue)">${escapeHtml(s)}</span>`).join('')}
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
                ${(expert.languages || []).map(l => `<span class="badge">${escapeHtml(String(l).toUpperCase())}</span>`).join('')}
              </div>
              <p style="font-size:13px;color:var(--text2);display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                <span class="icon-inline">${ic('file')} ${credCount} credentials${pendingCreds > 0 ? ` (${pendingCreds} pending)` : ''}</span>
                <span class="icon-inline">${ic('star')} ${expert.rating?.toFixed(1) || '—'}</span>
                <span class="icon-inline">${ic('chat')} ${expert._count?.conversations || 0} conversations</span>
              </p>
              ${credCount > 0 ? `
                <div style="margin-top:8px">
                  ${asArr(expert.credentials).map(c => `
                    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
                      <span style="font-size:13px">${escapeHtml(c.name)}</span>
                      <span class="badge ${c.status === 'approved' ? 'badge-green' : c.status === 'pending' ? 'badge-yellow' : 'badge-red'}">${c.status}</span>

                    </div>
                  `).join('')}
                </div>
              ` : ''}
              <div style="margin-top:10px">
                <button class="btn btn-outline btn-sm" onclick="toggleExpertDetails('${expert.id}')">${ic('eye')} Details</button>
              </div>
              <div id="expert-details-${expert.id}" style="display:none;margin-top:10px;padding:10px;background:var(--surface2);border-radius:6px;font-size:13px">
                <div style="margin-bottom:10px;padding:10px;border:1px solid var(--border);border-radius:8px;background:var(--surface)">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
                    <div>
                      <strong>Expert access</strong>
                      <div style="color:var(--text2);font-size:12px;margin-top:2px">RU/EN copy block for portal login and private specialist code.</div>
                    </div>
                    <span class="badge" style="font-family:ui-monospace,Menlo,monospace;font-size:14px">${escapeHtml(expert.accessCode?.code || 'No code yet')}</span>
                  </div>
                  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
                    <button class="btn btn-outline btn-sm" onclick="copyExpertAccess('${expert.id}', decodeURIComponent('${encArg(email)}'), decodeURIComponent('${encArg(expert.displayName)}'), decodeURIComponent('${encArg(expert.accessCode?.code || '')}'))">Copy RU+EN instruction</button>

                      <div>
                        <div>${escapeHtml(e.degree)} · ${escapeHtml(e.institution)}${e.year ? ` (${escapeHtml(e.year)})` : ''}</div>

                      </div>
                      ${e.documentUrl ? `
                        <div style="display:flex;gap:6px">
                          <button class="btn btn-outline btn-sm" onclick="previewAdminFile(decodeURIComponent('${encArg(e.documentUrl)}'), decodeURIComponent('${encArg(e.documentName || 'education-document')}'), '')">${ic('eye')} Preview</button>
                          <button class="btn btn-outline btn-sm" onclick="downloadAdminFile(decodeURIComponent('${encArg(e.documentUrl)}'), decodeURIComponent('${encArg(e.documentName || 'education-document')}'))">${ic('download')} Download</button>
                        </div>
                      ` : '<span style="color:var(--red);font-size:12px">No file</span>'}
                    </div>
                  `).join('')}
                ` : (expert.education ? `<div style="margin-bottom:6px"><strong>Education:</strong> ${escapeHtml(expert.education)}</div>` : '')}
                ${expert.experienceYears != null ? `<div style="margin:8px 0 6px"><strong>Experience:</strong> ${expert.experienceYears} years</div>` : ''}
                ${expert.contactPolicy ? `<div style="margin-bottom:6px"><strong>Contact policy:</strong> ${escapeHtml(expert.contactPolicy)}</div>` : ''}
                ${(expert.credentials || []).length > 0 ? `
                  <div style="margin-top:8px"><strong>Credentials (${expert.credentials.length}):</strong></div>
                  ${asArr(expert.credentials).map((c, i) => {
                    const isImage = c.fileType && /^image\//i.test(c.fileType);
                    const isPdf = c.fileType && /pdf/i.test(c.fileType);
                    const previewId = `cred-preview-${expert.id}-${i}`;
                    return `
                    <div style="padding:6px 0;border-bottom:1px dashed var(--border)">
                      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
                        <div>
                          <div>${escapeHtml(c.name)} <span class="badge ${c.status === 'approved' ? 'badge-green' : c.status === 'pending' ? 'badge-yellow' : 'badge-red'}">${c.status}</span></div>
                          ${c.issuer ? `<div style="color:var(--text2);font-size:12px">${escapeHtml(c.issuer)}</div>` : ''}
                        </div>
                        ${c.fileUrl ? `
                          <div style="display:flex;gap:6px">
                            <button class="btn btn-outline btn-sm" onclick="previewAdminFile(decodeURIComponent('${encArg(c.fileUrl)}'), decodeURIComponent('${encArg(c.name)}'), decodeURIComponent('${encArg(c.fileType || '')}'))">${ic('eye')} Preview</button>
                            <button class="btn btn-outline btn-sm" onclick="downloadAdminFile(decodeURIComponent('${encArg(c.fileUrl)}'), decodeURIComponent('${encArg(c.name)}'))">${ic('download')} Download</button>

                  `;
                  }).join('')}

                ${offers.length > 0 ? `

                    const nameMap = o.name || {};
                    const firstName = nameMap.en || nameMap.ru || Object.values(nameMap)[0] || '—';
                    const priceLabel = o.priceType === 'FREE' ? 'Free' : `${o.currency || '$'}${o.priceAmount ?? '—'}`;
                    return `<div style="padding:4px 0;border-bottom:1px dashed var(--border)">${escapeHtml(String(firstName))} · ${escapeHtml(o.format || '')} · ${escapeHtml(priceLabel)} · ${o.isPublished ? 'published' : 'hidden'}</div>`;

                ${expert.rejectionReason ? `

    function toggleExpertDetails(id) {
      const el = document.getElementById(`expert-details-${id}`);
      if (!el) return;
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function copyExpertAccess(id, email, name, code) {
      if (!code) {
        try {
          const result = await fetchAPI(`/admin/experts/${id}/access-code`);
          code = result?.code?.code || '';
        } catch (err) {
          toast('Failed to load expert code: ' + err.message);
          return;
        }
      }
      const portal = 'https://experts.eatsense.ch';
      const text = [
        `RU: Доступ эксперта ${name}`,
        `Портал: ${portal}`,
        `Email для входа: ${email}`,
        `Код специалиста для клиентов: ${code}`,
        'Вход без пароля: специалист вводит email и получает одноразовую ссылку на почту.',
        '',
        `EN: Expert access for ${name}`,
        `Portal: ${portal}`,
        `Sign-in email: ${email}`,
        `Specialist code for clients: ${code}`,
        'No shared password is used: the specialist enters their email and receives a one-time sign-in link.',
      ].join('\\n');
      try {
        await navigator.clipboard.writeText(text);
        toast('Expert access instruction copied');
      } catch {
        window.prompt('Copy expert access instruction', text);
      }
    }

    async function regenerateExpertCode(id) {
      if (!confirm('Regenerate this expert code? The old code will stop working.')) return;
      try {
        await fetchAPI(`/admin/experts/${id}/access-code/regenerate`, { method: 'POST' });
        toast('Expert code regenerated');
        loadExperts();
      } catch (err) {
        toast('Failed to regenerate code: ' + err.message);
      }
    }

    async function loadExpertCodeUsage(id) {
      const box = document.getElementById(`code-usage-${id}`);
      if (!box) return;
      if (box.style.display !== 'none' && box.innerHTML) {
        box.style.display = 'none';
        return;
      }
      box.style.display = 'block';
      box.textContent = 'Loading usage...';
      try {
        const result = await fetchAPI(`/admin/experts/${id}/access-code`);
        const usage = result?.usage || [];
        box.innerHTML = usage.length
          ? usage.map((u) => {
              const profile = u.client?.userProfile || {};
              const clientName = [profile.firstName, profile.lastName].filter(Boolean).join(' ') || u.client?.email || u.clientId;
              return `<div style="padding:4px 0;border-bottom:1px dashed var(--border)">${escapeHtml(clientName)} · ${new Date(u.createdAt).toLocaleString()}${u.conversation ? ` · chat ${escapeHtml(u.conversation.status)}` : ''}</div>`;
            }).join('')
          : 'No code usage yet.';
      } catch (err) {
        box.textContent = 'Failed to load usage: ' + err.message;
      }
    }

    function togglePreview(previewId) {
      const el = document.getElementById(previewId);
      if (!el) return;
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    <div class="row">
      <div><strong>${esc(e.degree)}</strong> — ${esc(e.institution)}${e.year ? ' (' + esc(e.year) + ')' : ''}</div>
      ${e.documentUrl ? `<div class="label">Document: ${esc(e.documentName || 'attached')} · open from the admin Preview/Download buttons</div>` : '<div class="label" style="color:#b00">No document attached</div>'}
    </div>`).join('') : (expert.education ? `<h2>Education</h2><div class="row">${esc(expert.education)}</div>` : '')}

  ${creds.length ? `<h2>Credentials (${creds.length})</h2>` + creds.map(c => `
    <div class="row">
      <div><strong>${esc(c.name)}</strong><span class="badge">${esc(c.status)}</span></div>
      ${c.issuer ? `<div class="label">Issuer: ${esc(c.issuer)}</div>` : ''}
      ${c.fileUrl ? `<div class="label">Document attached · open from the admin Preview/Download buttons</div>` : ''}
    </div>`).join('') : ''}

  <h2>Specializations</h2>
  <div class="row">${(expert.specializations || []).map(esc).join(', ') || '—'}</div>

  <h2>Languages</h2>
  <div class="row">${(expert.languages || []).map(l => esc(String(l).toUpperCase())).join(', ') || '—'}</div>

  ${offers.length ? `<h2>Offers (${offers.length})</h2>` + offers.map(o => {
    const nameMap = o.name || {};
    const oName = nameMap.en || nameMap.ru || Object.values(nameMap)[0] || '—';
    const price = o.priceType === 'FREE' ? 'Free' : `${esc(o.currency || '$')}${o.priceAmount ?? '—'}`;
    return `<div class="row"><strong>${esc(oName)}</strong> · ${esc(o.format || '')} · ${price} · ${o.isPublished ? 'published' : 'hidden'}</div>`;
  }).join('') : ''}

  <div class="footer">EatSense — expert application export · ${new Date().toISOString()}</div>
</body></html>`;

        const w = window.open('', '_blank');
        if (!w) { toast('Popup blocked — allow popups for this site'); return; }
        w.document.write(html);
        w.document.close();
      } catch (err) {
        toast('Export failed: ' + err.message);
      }
    }

    async function saveAdminNotes(id) {
      const el = document.getElementById(`notes-${id}`);
      if (!el) return;
      try {
        await fetchAPI(`/admin/experts/${id}/notes`, {
          method: 'PATCH',
          body: JSON.stringify({ notes: el.value }),
        });
        toast('Notes saved');
      } catch (err) {
        toast('Save failed: ' + err.message);
      }
    }

    async function showAuditLog(id) {
      const box = document.getElementById(`audit-${id}`);
      if (!box) return;
      if (box.style.display === 'block') {
        box.style.display = 'none';
        return;
      }
      box.style.display = 'block';
      box.innerHTML = '<div style="padding:8px;color:var(--text2)">Loading…</div>';
      try {
        const entries = await fetchAPI(`/admin/experts/audit-log?targetId=${encodeURIComponent(id)}&limit=50`);
        if (!entries || entries.length === 0) {
          box.innerHTML = '<div style="padding:8px;color:var(--text2)">No activity recorded yet.</div>';
          return;
        }
        box.innerHTML = `
          <div style="border:1px solid var(--border);border-radius:6px;background:var(--surface);padding:8px">
            <strong style="display:block;margin-bottom:6px">Activity log</strong>
            ${entries.map(e => `
              <div style="padding:4px 0;border-bottom:1px dashed var(--border);font-size:12px">
                <span style="color:var(--text2)">${new Date(e.createdAt).toLocaleString()}</span> ·
                <strong>${escapeHtml(e.action)}</strong>
                ${e.payload ? ` · <span style="color:var(--text2)">${escapeHtml(JSON.stringify(e.payload))}</span>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      } catch (err) {
        box.innerHTML = `<div style="padding:8px;color:var(--red)">Load failed: ${escapeHtml(err.message)}</div>`;
      }
    }

    let pendingCredentials = [];
    function openCreateExpertModal() {
      document.getElementById('create-expert-modal').style.display = 'flex';
    }
    function closeCreateExpertModal() {
      document.getElementById('create-expert-modal').style.display = 'none';
      document.getElementById('create-expert-form').reset();
      document.getElementById('code-availability').textContent = '';
      document.getElementById('credentials-preview').textContent = '';
      pendingCredentials = [];
    }
    function onCredentialsPicked(ev) {
      const files = Array.from(ev.target.files || []);
      pendingCredentials = [];
      const preview = document.getElementById('credentials-preview');
      preview.innerHTML = '';
      const promises = files.map((file) => new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = String(reader.result).split(',')[1] || '';
          const name = file.name.replace(/\.[^.]+$/, '');
          pendingCredentials.push({
            name,
            filename: file.name,
            mimeType: file.type || 'application/pdf',
            base64,
          });
          const div = document.createElement('div');
          div.textContent = `✓ ${file.name} (${(file.size / 1024).toFixed(0)} KB)`;
          preview.appendChild(div);
          resolve();
        };
        reader.onerror = () => resolve();
        reader.readAsDataURL(file);
      }));
      Promise.all(promises);
    }
    function slugifyForCode(s) {
      return String(s || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    function suggestExpertCode(variant) {
      const f = document.getElementById('create-expert-form');
      const first = slugifyForCode(f.firstName.value);
      const last = slugifyForCode(f.lastName.value);
      const type = slugifyForCode(f.type.value);
      const city = slugifyForCode(f.city.value);
      let code = '';
      if (variant === 0 && first && type) code = `${first}-${type}`;
      else if (variant === 1 && first && city) code = `${first}-${city}-01`;
      else if (variant === 2 && first && last) code = `${first}-${last}`;
      if (!code) { toast('Fill required fields first'); return; }
      f.accessCode.value = code.slice(0, 32);
      checkAccessCodeAvailability(f.accessCode.value);
    }
    let codeCheckTimer = null;
    async function checkAccessCodeAvailability(rawCode) {
      const el = document.getElementById('code-availability');
      const code = (rawCode || '').trim().toUpperCase();
      el.textContent = '';
      if (!code) return;
      if (codeCheckTimer) clearTimeout(codeCheckTimer);
      codeCheckTimer = setTimeout(async () => {
        try {
          const res = await fetchAPI('/admin/experts/access-code/check', {
            method: 'POST',
            body: JSON.stringify({ code }),
          });
          if (res.available) {
            el.textContent = '✓ available';
            el.style.color = 'green';
          } else {
            el.textContent = res.reason === 'invalid_format' ? '✗ invalid format' : '✗ already taken';
            el.style.color = 'crimson';
          }
        } catch (e) { el.textContent = ''; }
      }, 350);
    }
    async function submitCreateExpert(ev) {
      ev.preventDefault();
      const f = ev.target;
      const fd = new FormData(f);
      const obj = {};
      fd.forEach((v, k) => { obj[k] = typeof v === 'string' ? v.trim() : v; });
      if (obj.languages) obj.languages = obj.languages.split(',').map(s => s.trim()).filter(Boolean);
      if (obj.specializations) obj.specializations = obj.specializations.split(',').map(s => s.trim()).filter(Boolean);
      if (obj.experienceYears) obj.experienceYears = parseInt(obj.experienceYears, 10) || 0;
      if (!obj.accessCode) delete obj.accessCode;
      // Drop the raw FileList — replaced by base64 collected in pendingCredentials.
      delete obj.credentialFiles;
      if (pendingCredentials.length) obj.credentials = pendingCredentials;
      try {
        const res = await fetchAPI('/admin/experts', { method: 'POST', body: JSON.stringify(obj) });
        const credText = res.credentials ? `, ${res.credentials} credentials` : '';
        const magicLinkText = res.magicLinkSent
          ? ' — welcome magic-link sent by email'
          : ' — ⚠ magic-link not sent (check SMTP/logs)';
        toast(`Expert created. Code: ${res.accessCode || '(auto)'}${credText}${magicLinkText}`);
        closeCreateExpertModal();
        loadExperts();
      } catch (e) {
        toast('Create failed: ' + (e?.message || e));
      }
    }

    async function approveExpert(id) {
      if (!confirm('Approve this expert? Their profile will become public.')) return;
      try {
        await fetchAPI(`/admin/experts/${id}/approve`, { method: 'POST' });
        toast('Expert approved');
        loadExperts();
      } catch (err) {
        toast('Error: ' + err.message);
      }
    }

    async function unpublishExpert(id) {
      if (!confirm('Unpublish this expert? Profile will be hidden from marketplace; direct links still work.')) return;
      try {
        await fetchAPI(`/admin/experts/${id}/unpublish`, { method: 'POST' });
        toast('Expert unpublished');
        loadExperts();
      } catch (err) {
        toast('Error: ' + err.message);
      }
    }

    async function publishExpert(id) {
      if (!confirm('Re-publish this expert on the marketplace?')) return;
      try {
        await fetchAPI(`/admin/experts/${id}/publish`, { method: 'POST' });
        toast('Expert re-published');
        loadExperts();
      } catch (err) {
        toast('Error: ' + err.message);
      }
    }

    async function rejectExpert(id) {
      const reason = prompt('Rejection reason (optional):');
      if (reason === null) return; // cancelled
      try {
        await fetchAPI(`/admin/experts/${id}/reject`, {
          method: 'POST',
          body: JSON.stringify({ reason: reason || undefined }),
        });
        toast('Expert rejected');
        loadExperts();
      } catch (err) {
        toast('Error: ' + err.message);
      }
    }

    // ===== HELPERS =====
    function getUserName(user) {
      if (!user) return 'Unknown';
      const profile = user.userProfile;
      if (profile?.firstName) return [profile.firstName, profile.lastName].filter(Boolean).join(' ');
      return user.email || 'Unknown';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }
  </script>
</body>
</html>
